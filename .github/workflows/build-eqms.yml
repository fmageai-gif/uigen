name: Build EQMS Windows EXE

# Produces the single-file Windows executable for HP Mainstream EQMS so it can
# be downloaded and run WITHOUT installing Python or any dependencies.
#
# The built .exe is uploaded as a workflow artifact on every run (download it
# from the run's "Artifacts" section) and attached to GitHub Releases on publish.

on:
  push:
    branches:
      - master
      - "claude/hp-eqms-desktop-app-ws76ht"
    paths:
      - "eqms/**"
      - ".github/workflows/build-eqms.yml"
    tags:
      - "v*"
  pull_request:
    paths:
      - "eqms/**"
      - ".github/workflows/build-eqms.yml"
  release:
    types: [created]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to attach the .exe to releases

jobs:
  build-windows-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: eqms
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: eqms/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Build single-file executable
        run: python scripts/build.py --clean

      - name: Verify the executable exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/HP-Mainstream-EQMS.exe")) {
            Write-Error "Expected dist/HP-Mainstream-EQMS.exe was not produced"
            exit 1
          }
          $size = (Get-Item "dist/HP-Mainstream-EQMS.exe").Length / 1MB
          Write-Host ("Built HP-Mainstream-EQMS.exe ({0:N1} MB)" -f $size)

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HP-Mainstream-EQMS-exe
          path: eqms/dist/HP-Mainstream-EQMS.exe
          if-no-files-found: error
          retention-days: 30

      # Publish a GitHub Release with the .exe attached when a v* tag is pushed
      # (softprops creates the release for the tag) or when a release is created
      # manually in the UI.
      - name: Publish / attach EXE to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: HP Mainstream EQMS ${{ github.ref_name }}
          files: eqms/dist/HP-Mainstream-EQMS.exe
          generate_release_notes: true
